apiVersion: v1
kind: Service
metadata:
  name: airflow-api
  namespace: airflow
spec:
  selector:
    app: airflow-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-api
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-api
  template:
    metadata:
      labels:
        app: airflow-api
    spec:
      containers:
        - name: api
          image: your-registry/airflow:1.0.0
          command: ["bash", "-lc"]
          args: ["airflow api-server"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: airflow-env
            - secretRef:
                name: airflow-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10