apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
        - name: scheduler
          image: yourrepo/airflow:1.0.0
          command: ["bash","-lc"]
          args: ["airflow scheduler"]
          envFrom:
            - configMapRef:
                name: airflow-env
            - secretRef:
                name: airflow-secrets