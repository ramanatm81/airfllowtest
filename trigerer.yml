apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-triggerer
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-triggerer
  template:
    metadata:
      labels:
        app: airflow-triggerer
    spec:
      containers:
        - name: triggerer
          image: your-registry/airflow:1.0.0
          command: ["bash", "-lc"]
          args: ["airflow triggerer"]
          envFrom:
            - configMapRef:
                name: airflow-env
            - secretRef:
                name: airflow-secrets