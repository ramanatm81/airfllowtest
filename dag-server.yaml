apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-dag-processor
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-dag-processor
  template:
    metadata:
      labels:
        app: airflow-dag-processor
    spec:
      containers:
        - name: dag-processor
          image: your-registry/airflow:1.0.0
          command: ["bash", "-lc"]
          args: ["airflow dag-processor"]
          envFrom:
            - configMapRef:
                name: airflow-env
            - secretRef:
                name: airflow-secrets